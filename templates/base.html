<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock title %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="header-title">
          <a href="/"> Мой блог </a>
        </div>
        <div class="header-buttons">
          <a href="{{ url_for('about') }}" class="btn">О блоге</a>
          {% if 'user' not in session %}<a
            href="{{ url_for('login') }}"
            class="btn"
            >Войти</a
          >{% else %}<a href="{{ url_for('logout') }}" class="btn">Выйти</a>{%
          endif %}

          <a href="{{ url_for('create') }}" class="btn btn-primary"
            >Добавить статью</a
          >
        </div>
      </div>
    </header>
    <div class="container">{% block content %}{% endblock content %}</div>
    <footer>© 2025 Евгений. Все права защищены.</footer>
  </body>
</html>
