{% extends "base.html" %} {% block title %} Мой блог {% endblock title %} {%
block content %} {% if posts %} {% for post in posts %}
<div class="post">
  <h2 class="post-title">{{ post.title }}</h2>
  <p class="post-text">{{ post.text }}</p>
  <a class="btn btn-link" href="/post/{{ post.id }}">Читать полностью</a>
</div>
{% endfor %} {% else %}
<div class="post">
  <h2>Нет статей</h2>
</div>
{% endif %} {% endblock content %}
